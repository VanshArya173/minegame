<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mines Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth Bar -->
  <div id="authBar" style="display:flex; justify-content:space-between; align-items:center; background:#1a2332; border-bottom:1px solid #243044; padding:10px 20px; font-size:13px;">
    <span id="authUsername" style="color:#00e701; font-weight:600;">Guest</span>
    <div style="display:flex; gap:10px;">

      <!-- ✅ Leaderboard button -->
      <button onclick="openLeaderboard()"
        style="padding:6px 16px; background:#243044; color:#c0c7d0; border:1px solid #2e3f58; border-radius:6px; cursor:pointer; font-size:13px;">
        🏆 Leaderboard
      </button>

      <!-- ✅ Daily claim button -->
      <button onclick="claimDaily()" id="claimBtn"
        style="padding:6px 16px; background:#7c3aed; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600;">
        🎁 Daily Claim
      </button>

      <button onclick="logoutUser()"
        style="padding:6px 16px; background:transparent; border:1px solid #243044; color:#7a8fa6; border-radius:6px; cursor:pointer; font-size:13px;">
        Logout
      </button>
    </div>
  </div>

  <!-- ✅ Leaderboard Modal -->
  <div id="leaderboardModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:999; align-items:center; justify-content:center;">
    <div style="background:#1a2332; border:1px solid #243044; border-radius:12px; padding:28px 24px; width:360px; max-width:90vw;">
      <h3 style="color:#fff; font-size:16px; margin-bottom:16px;">🏆 Top 10 Players</h3>
      <div id="leaderboardList"></div>
      <button onclick="closeLeaderboard()"
        style="margin-top:16px; width:100%; padding:10px; background:#243044; border:none; color:#c0c7d0; border-radius:8px; cursor:pointer;">
        Close
      </button>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="root">
    <div class="sidebar">
      <h2 class="logo">MINES</h2>

      <div class="input-group">
        <label>Bet Amount</label>
        <div class="input-row">
          <input type="number" id="betInput" value="1.00" min="0.01" step="0.01"/>
          <button onclick="halveBet()">1/2</button>
          <button onclick="doubleBet()">2x</button>
        </div>
      </div>

      <div class="input-group">
        <label>Mines</label>
        <select id="mineSelect">
          <option>1</option><option>2</option>
          <option selected>3</option><option>5</option>
          <option>10</option><option>15</option>
          <option>20</option><option>24</option>
        </select>
      </div>

      <div class="info-box">
        <div class="info-row">
          <span>Total Profit</span>
          <span id="profitDisplay">$0.00</span>
        </div>
        <div class="info-row">
          <span>Multiplier</span>
          <span id="multiplierDisplay">1.00×</span>
        </div>
        <div class="info-row">
          <span>Next tile chance</span>
          <span id="chanceDisplay">-</span>
        </div>
      </div>

      <button class="btn-main" id="mainBtn" onclick="handleMainBtn()">
        Place Bet
      </button>

      <div class="balance-box">
        <span>Balance</span>
        <span id="balanceDisplay">$0.00</span>
      </div>
    </div>

    <div class="main">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- Auth + Claim + Leaderboard Scripts -->
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = '/login.html';
    }

    const savedUsername = localStorage.getItem('username');
    if (savedUsername) {
      document.getElementById('authUsername').textContent = savedUsername;
    }

    // ✅ Daily Claim
    async function claimDaily() {
      const btn = document.getElementById('claimBtn');
      btn.disabled = true;
      btn.textContent = 'Claiming...';

      const res  = await fetch('/api/wallet/claim', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
      });
      const data = await res.json();

      btn.disabled = false;
      btn.textContent = '🎁 Daily Claim';

      if (data.error) { showToast(data.error); return; }
      updateBalance(data.balance);
      showToast('🎁 Claimed $25,000!');
    }

    // ✅ Leaderboard
    function openLeaderboard() {
      document.getElementById('leaderboardModal').style.display = 'flex';
      const list = document.getElementById('leaderboardList');
      list.innerHTML = '<div style="color:#7a8fa6; text-align:center; padding:16px;">Loading...</div>';

      fetch('/api/wallet/leaderboard', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
      })
      .then(r => r.json())
      .then(data => {
        if (!data.length) {
          list.innerHTML = '<div style="color:#7a8fa6; text-align:center; padding:16px;">No players yet</div>';
          return;
        }
        list.innerHTML = data.map((u, i) => `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #243044; font-size:13px;">
            <span style="color:${i === 0 ? '#f59e0b' : i === 1 ? '#9ca3af' : i === 2 ? '#b45309' : '#c0c7d0'}">
              ${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)} &nbsp;${u.username}
            </span>
            <span style="color:#00e701; font-weight:600;">$${parseFloat(u.balance).toFixed(2)}</span>
          </div>
        `).join('');
      })
      .catch(() => {
        list.innerHTML = '<div style="color:#e74c3c; text-align:center; padding:16px;">Failed to load</div>';
      });
    }

    function closeLeaderboard() {
      document.getElementById('leaderboardModal').style.display = 'none';
    }

    function logoutUser() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login.html';
    }
  </script>

  <!-- Game Scripts — order matters! -->
  <script src="src/utils/Format.js"></script>
  <script src="src/utils/sound.js"></script>
  <script src="src/game/Multiplier.js"></script>
  <script src="src/game/board.js"></script>
  <script src="src/game/provably.js"></script>
  <script src="src/game/minegame.js"></script>
  <script src="src/ui/boardui.js"></script>
  <script src="src/ui/controls.js"></script>
  <script src="src/ui/statspanel.js"></script>
  <script src="src/main.js"></script>

</body>
</html>
