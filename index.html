<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mines Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth Bar -->
  <div id="authBar" style="display:flex; justify-content:space-between; align-items:center; background:#1a2332; border-bottom:1px solid #243044; padding:10px 20px; font-size:13px;">
    <span id="authUsername" style="color:#00e701; font-weight:600;">Guest</span>
    <div style="display:flex; gap:10px;">
      <button onclick="openDeposit()"
        style="padding:6px 16px; background:#00e701; color:#0a1a0a; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600;">
        + Add Funds
      </button>
      <button onclick="logoutUser()"
        style="padding:6px 16px; background:transparent; border:1px solid #243044; color:#7a8fa6; border-radius:6px; cursor:pointer; font-size:13px;">
        Logout
      </button>
    </div>
  </div>

  <!-- Deposit Modal -->
  <div id="depositModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:999; align-items:center; justify-content:center;">
    <div style="background:#1a2332; border:1px solid #243044; border-radius:12px; padding:28px 24px; width:320px;">
      <h3 style="color:#fff; font-size:16px; margin-bottom:16px;">Add Funds to Wallet</h3>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;">
        <button onclick="setDeposit(100)"
          style="padding:8px 14px; background:#243044; border:none; color:#c0c7d0; border-radius:6px; cursor:pointer;">$100</button>
        <button onclick="setDeposit(500)"
          style="padding:8px 14px; background:#243044; border:none; color:#c0c7d0; border-radius:6px; cursor:pointer;">$500</button>
        <button onclick="setDeposit(1000)"
          style="padding:8px 14px; background:#243044; border:none; color:#c0c7d0; border-radius:6px; cursor:pointer;">$1,000</button>
        <button onclick="setDeposit(5000)"
          style="padding:8px 14px; background:#243044; border:none; color:#c0c7d0; border-radius:6px; cursor:pointer;">$5,000</button>
      </div>
      <input type="number" id="depositAmount" placeholder="Custom amount"
        style="width:100%; background:#0f1923; border:1px solid #243044; color:#fff; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; margin-bottom:12px;"/>
      <div style="display:flex; gap:8px;">
        <button onclick="closeDeposit()"
          style="flex:1; padding:11px; background:transparent; border:1px solid #243044; color:#7a8fa6; border-radius:8px; cursor:pointer;">
          Cancel
        </button>
        <button onclick="submitDeposit()"
          style="flex:1; padding:11px; background:#00e701; color:#0a1a0a; border:none; border-radius:8px; font-weight:600; cursor:pointer;">
          Add Funds
        </button>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="root">
    <div class="sidebar">
      <h2 class="logo">MINES</h2>

      <div class="input-group">
        <label>Bet Amount</label>
        <div class="input-row">
          <input type="number" id="betInput" value="1.00" min="0.01" step="0.01"/>
          <button onclick="halveBet()">1/2</button>
          <button onclick="doubleBet()">2x</button>
        </div>
      </div>

      <div class="input-group">
        <label>Mines</label>
        <select id="mineSelect">
          <option>1</option><option>2</option>
          <option selected>3</option><option>5</option>
          <option>10</option><option>15</option>
          <option>20</option><option>24</option>
        </select>
      </div>

      <div class="info-box">
        <div class="info-row">
          <span>Total Profit</span>
          <span id="profitDisplay">$0.00</span>
        </div>
        <div class="info-row">
          <span>Multiplier</span>
          <span id="multiplierDisplay">1.00×</span>
        </div>
        <div class="info-row">
          <span>Next tile chance</span>
          <span id="chanceDisplay">-</span>
        </div>
      </div>

      <button class="btn-main" id="mainBtn" onclick="handleMainBtn()">
        Place Bet
      </button>

      

      <div class="balance-box">
        <span>Balance</span>
        <span id="balanceDisplay">$0.00</span>
      </div>
    </div>

    <div class="main">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- Auth Script -->
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = '/login.html';
    }

    const savedUsername = localStorage.getItem('username');
    if (savedUsername) {
      document.getElementById('authUsername').textContent = savedUsername;
    }

    function openDeposit() {
      document.getElementById('depositModal').style.display = 'flex';
    }

    function closeDeposit() {
      document.getElementById('depositModal').style.display = 'none';
    }

    function setDeposit(amount) {
      document.getElementById('depositAmount').value = amount;
    }

    async function submitDeposit() {
      const amount = parseFloat(document.getElementById('depositAmount').value);
      if (!amount || amount <= 0) { alert('Enter a valid amount'); return; }

      const res = await fetch('/api/wallet/deposit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        body: JSON.stringify({ amount })
      });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }

      updateBalance(data.balance);
      closeDeposit();
      showToast(formatMoney(amount) + ' added to wallet!');
    }

    function logoutUser() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login.html';
    }
  </script>

  <!-- Game Scripts — order matters! -->
  <script src="src/utils/Format.js"></script>
  <script src="src/utils/sound.js"></script>
  <script src="src/game/Multiplier.js"></script>
  <script src="src/game/board.js"></script>
  <script src="src/game/provably.js"></script>
  <script src="src/game/minegame.js"></script>
  <script src="src/ui/boardui.js"></script>
  <script src="src/ui/controls.js"></script>
  <script src="src/ui/statspanel.js"></script>
  <script src="src/main.js"></script>

</body>
</html>
